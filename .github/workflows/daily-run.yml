name: MSM Forward Test Daily Run @ 19:30 KST

# 19:30 KST = 10:30 UTC (월~금)
# 한국 공휴일은 KRX biz day 체크에서 자동 skip (latest_biz가 이전 영업일로 반환)

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 월~금 10:30 UTC = 19:30 KST
  workflow_dispatch:           # 수동 trigger 가능

permissions:
  contents: write

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pyarrow pandas numpy pykrx requests

      - name: Verify environment
        run: |
          echo "Run time KST: $(TZ=Asia/Seoul date)"
          echo "Repo HEAD: $(git rev-parse --short HEAD)"
          python -c "import pandas, numpy, pykrx; print('packages OK')"

      - name: Configure git
        run: |
          git config user.email "msm-bot@github.actions"
          git config user.name "MSM Bot"

      - name: Run daily forward test
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          cd ${{ github.workspace }}
          # cron run 환경 = repo root. daily_run.py 직접 호출
          python daily_run.py

      - name: Verify push success
        run: |
          echo "Final HEAD: $(git rev-parse --short HEAD)"
          echo "Last commit: $(git log -1 --oneline)"
          # log file 변경 확인
          if [ -f forward_test/log/realized/realized_log.parquet ]; then
            python -c "
import pandas as pd
df = pd.read_parquet('forward_test/log/realized/realized_log.parquet')
print(f'realized_log: {len(df)} rows, last entry_date={df[\"entry_date\"].max()}')
"
          fi
